<!DOCTYPE html>
<html>
<head>
    <!-- 페이지 제목 -->
    <title>감성 분석 서비스</title>
    <!-- 스타일 → 페이지를 예쁘게 꾸며줘요 -->
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 150px;
            font-size: 16px;
            padding: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .result {
            font-size: 30px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- 제목 -->
    <h1>🎬 영화 리뷰 감성 분석</h1>
    <p>영화 리뷰를 입력하면 긍정/부정을 분석해줘요!</p>

    <!-- 입력 폼 → /analyze 로 데이터 보내요 -->
    <form action="/analyze" method="POST">
        <!-- 리뷰 입력창 -->
        <textarea name="review" placeholder="영화 리뷰를 입력하세요...">{{ review }}</textarea>
        <!-- 분석 버튼 -->
        <button type="submit">분석하기</button>
    </form>

    <!-- 결과 출력 → 결과가 있을 때만 보여줘요 -->
    {% if result %}
    <div class="result">
        <p>분석 결과: {{ result }}</p>
    </div>
    {% endif %}
</body>
</html>
